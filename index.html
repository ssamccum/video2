<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Vertical Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .aspect-9-16 {
            aspect-ratio: 9 / 16;
            max-height: 80vh;
        }

        .preview-container {
            position: relative;
            background: #000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid #334155;
            border-radius: 1rem;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }
        
        .tab-active {
            border-bottom: 2px solid #38bdf8;
            color: #38bdf8;
        }
        
        .particle {
            pointer-events: none;
            position: absolute;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8">
        
        <!-- 왼쪽: 미리보기 섹션 -->
        <div class="w-full lg:w-1/2 flex flex-col items-center">
            <h1 class="text-2xl font-bold mb-4 text-sky-400">Gemini Video Editor</h1>
            
            <div class="preview-container aspect-9-16 w-full max-w-[360px]">
                <canvas id="videoCanvas" width="1080" height="1920"></canvas>
                
                <!-- 로딩 오버레이 -->
                <div id="loadingOverlay" class="absolute inset-0 bg-black/60 flex items-center justify-center hidden">
                    <div class="text-center">
                        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-sky-500 border-t-transparent"></div>
                        <p class="mt-4 font-medium" id="statusMessage">처리 중...</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-6 w-full max-w-[360px]">
                <button id="playBtn" class="flex-1 bg-sky-600 hover:bg-sky-500 py-3 rounded-lg font-bold transition">재생 / 일시정지</button>
                <button id="exportBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-bold transition">MP4 내보내기</button>
            </div>
            <p class="text-xs text-slate-400 mt-2 text-center">* 내보내기는 재생되는 화면을 실시간 캡처하여 저장합니다.</p>
        </div>

        <!-- 오른쪽: 컨트롤 섹션 -->
        <div class="w-full lg:w-1/2 bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
            
            <!-- 탭 메뉴 -->
            <div class="flex border-b border-slate-700 mb-6 overflow-x-auto scroll-hide">
                <button onclick="switchTab('text')" id="tab-text" class="px-4 py-2 font-medium whitespace-nowrap tab-active">문구 설정</button>
                <button onclick="switchTab('media')" id="tab-media" class="px-4 py-2 font-medium whitespace-nowrap">미디어 업로드</button>
                <button onclick="switchTab('effects')" id="tab-effects" class="px-4 py-2 font-medium whitespace-nowrap">애니메이션 효과</button>
            </div>

            <!-- 문구 설정 탭 -->
            <div id="content-text" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">상단: 퍼스트 문구</label>
                    <input type="text" id="textFirst" placeholder="첫 번째 문구를 입력하세요" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 focus:ring-2 focus:ring-sky-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">상단: 세컨드 문구</label>
                    <input type="text" id="textSecond" placeholder="두 번째 문구를 입력하세요" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 focus:ring-2 focus:ring-sky-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">하단: 서드 문구</label>
                    <input type="text" id="textThird" placeholder="하단 문구를 입력하세요" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 focus:ring-2 focus:ring-sky-500 outline-none">
                </div>
            </div>

            <!-- 미디어 업로드 탭 -->
            <div id="content-media" class="hidden space-y-6">
                <!-- 이미지 -->
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">이미지 (최대 10장, 5초 간격)</label>
                    <input type="file" id="inputImages" multiple accept="image/*" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100">
                    <div id="imageList" class="flex gap-2 mt-2 overflow-x-auto p-1"></div>
                </div>
                <!-- 동영상 -->
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">동영상 (최대 5개, 순차 재생)</label>
                    <input type="file" id="inputVideos" multiple accept="video/*" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
                    <div id="videoList" class="flex gap-2 mt-2 overflow-x-auto p-1"></div>
                </div>
                <!-- 오디오 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">배경 음악</label>
                        <input type="file" id="inputBgm" accept="audio/*" class="text-xs w-full">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">나레이션</label>
                        <input type="file" id="inputNarration" accept="audio/*" class="text-xs w-full">
                    </div>
                </div>
            </div>

            <!-- 애니메이션 효과 탭 -->
            <div id="content-effects" class="hidden">
                <label class="block text-sm font-medium text-slate-400 mb-3">적용할 효과 선택</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setEffect('none')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">없음</button>
                    <button onclick="setEffect('star')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">별빛</button>
                    <button onclick="setEffect('rain')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">소나기</button>
                    <button onclick="setEffect('drizzle')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">이슬비</button>
                    <button onclick="setEffect('snow')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">눈송이</button>
                    <button onclick="setEffect('cherry')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">벚꽃</button>
                    <button onclick="setEffect('small-flower')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">작은꽃송이</button>
                    <button onclick="setEffect('sun')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">햇빛</button>
                    <button onclick="setEffect('leaves')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">낙엽</button>
                    <button onclick="setEffect('small-leaves')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">작은 낙엽</button>
                    <button onclick="setEffect('steam')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">수증기</button>
                    <button onclick="setEffect('frost')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">김서림</button>
                    <button onclick="setEffect('fog')" class="effect-btn bg-slate-700 p-2 rounded text-xs hover:bg-sky-600 transition">안개</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const exportBtn = document.getElementById('exportBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // 상태 관리
        let mediaStack = []; // {type, element, duration}
        let currentMediaIndex = 0;
        let isPlaying = false;
        let startTime = 0;
        let pauseTime = 0;
        let currentEffect = 'none';
        let particles = [];
        
        // 오디오
        const bgm = new Audio();
        const narration = new Audio();
        
        // 텍스트
        const texts = {
            first: '',
            second: '',
            third: ''
        };

        // 탭 전환
        window.switchTab = (tab) => {
            ['text', 'media', 'effects'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        };

        // 텍스트 업데이트
        ['textFirst', 'textSecond', 'textThird'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                texts[id.replace('text', '').toLowerCase()] = e.target.value;
                if (!isPlaying) renderFrame(0);
            });
        });

        // 이미지 업로드 (최대 10장)
        document.getElementById('inputImages').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files).slice(0, 10);
            const list = document.getElementById('imageList');
            list.innerHTML = '';
            
            for (let file of files) {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await img.decode();
                
                const thumb = document.createElement('img');
                thumb.src = img.src;
                thumb.className = "w-16 h-28 object-cover rounded border border-slate-500";
                list.appendChild(thumb);
                
                mediaStack.push({ type: 'image', element: img, duration: 5000 });
            }
            updateTotalDuration();
        });

        // 동영상 업로드 (최대 5개)
        document.getElementById('inputVideos').addEventListener('change', (e) => {
            const files = Array.from(e.target.files).slice(0, 5);
            const list = document.getElementById('videoList');
            list.innerHTML = '';
            
            for (let file of files) {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.muted = true;
                video.onloadedmetadata = () => {
                    const thumb = document.createElement('div');
                    thumb.className = "w-16 h-28 bg-slate-700 rounded border border-slate-500 flex items-center justify-center text-[10px]";
                    thumb.innerText = "VIDEO";
                    list.appendChild(thumb);
                    
                    mediaStack.push({ type: 'video', element: video, duration: video.duration * 1000 });
                    updateTotalDuration();
                };
            }
        });

        // 오디오 업로드
        document.getElementById('inputBgm').addEventListener('change', (e) => {
            bgm.src = URL.createObjectURL(e.target.files[0]);
            bgm.loop = true;
        });
        document.getElementById('inputNarration').addEventListener('change', (e) => {
            narration.src = URL.createObjectURL(e.target.files[0]);
        });

        // 효과 설정
        window.setEffect = (effect) => {
            currentEffect = effect;
            initParticles();
        };

        function initParticles() {
            particles = [];
            let count = 50;
            if (currentEffect === 'none') return;
            
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 10 + 5,
                    speed: Math.random() * 2 + 1,
                    opacity: Math.random(),
                    angle: Math.random() * Math.PI * 2
                });
            }
        }

        function renderParticles() {
            if (currentEffect === 'none') return;
            
            ctx.save();
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                
                switch(currentEffect) {
                    case 'star':
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size/3, 0, Math.PI * 2);
                        ctx.fill();
                        p.opacity = 0.5 + Math.sin(Date.now() * 0.005 + p.x) * 0.5;
                        break;
                    case 'rain':
                    case 'drizzle':
                        ctx.strokeStyle = 'rgba(174, 194, 224, 0.5)';
                        ctx.lineWidth = currentEffect === 'rain' ? 3 : 1;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x, p.y + (currentEffect === 'rain' ? 30 : 15));
                        ctx.stroke();
                        p.y += currentEffect === 'rain' ? 15 : 7;
                        break;
                    case 'snow':
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size/2, 0, Math.PI * 2);
                        ctx.fill();
                        p.y += p.speed;
                        p.x += Math.sin(p.y * 0.01) * 2;
                        break;
                    case 'cherry':
                    case 'small-flower':
                        ctx.fillStyle = currentEffect === 'cherry' ? '#ffb7c5' : '#fff9c4';
                        ctx.beginPath();
                        ctx.ellipse(p.x, p.y, p.size/2, p.size/3, p.angle, 0, Math.PI * 2);
                        ctx.fill();
                        p.y += p.speed;
                        p.angle += 0.02;
                        p.x += Math.cos(p.y * 0.02) * 2;
                        break;
                    case 'sun':
                        const grad = ctx.createRadialGradient(canvas.width/2, 200, 50, canvas.width/2, 200, 400);
                        grad.addColorStop(0, 'rgba(255, 230, 0, 0.1)');
                        grad.addColorStop(1, 'transparent');
                        ctx.fillStyle = grad;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        break;
                    case 'leaves':
                    case 'small-leaves':
                        ctx.fillStyle = p.size > 10 ? '#d35400' : '#f39c12';
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.quadraticCurveTo(p.x + p.size, p.y - p.size, p.x + p.size*2, p.y);
                        ctx.quadraticCurveTo(p.x + p.size, p.y + p.size, p.x, p.y);
                        ctx.fill();
                        p.y += p.speed;
                        p.x += Math.sin(p.y * 0.01) * 3;
                        break;
                    case 'steam':
                    case 'fog':
                    case 'frost':
                        ctx.fillStyle = `rgba(255, 255, 255, ${currentEffect === 'frost' ? 0.02 : 0.05})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * 10, 0, Math.PI * 2);
                        ctx.fill();
                        p.y -= p.speed * 0.5;
                        p.x += Math.sin(p.y * 0.01);
                        break;
                }

                if (p.y > canvas.height + 50) p.y = -50;
                if (p.y < -100) p.y = canvas.height + 50;
                if (p.x > canvas.width + 50) p.x = -50;
                if (p.x < -50) p.x = canvas.width + 50;
            });
            ctx.restore();
        }

        function renderFrame(timestamp) {
            if (!mediaStack.length) {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawTexts();
                return;
            }

            // 현재 재생 중인 미디어 찾기
            let elapsed = isPlaying ? (Date.now() - startTime) : pauseTime;
            let totalTime = 0;
            let targetIdx = -1;

            for (let i = 0; i < mediaStack.length; i++) {
                if (elapsed >= totalTime && elapsed < totalTime + mediaStack[i].duration) {
                    targetIdx = i;
                    break;
                }
                totalTime += mediaStack[i].duration;
            }

            // 끝났으면 처음으로
            if (targetIdx === -1 && elapsed >= totalTime && isPlaying) {
                startTime = Date.now();
                targetIdx = 0;
                elapsed = 0;
            }

            const current = mediaStack[targetIdx] || mediaStack[0];
            
            // 그리기
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (current.type === 'image') {
                const img = current.element;
                // 중앙 정렬 및 비율 유지 (9:16)
                const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width - img.width * ratio) / 2;
                const y = (canvas.height - img.height * ratio) / 2;
                
                // 간단한 페이드 인 애니메이션
                const itemElapsed = elapsed - (totalTime - current.duration);
                ctx.globalAlpha = itemElapsed < 500 ? itemElapsed / 500 : (current.duration - itemElapsed < 500 ? (current.duration - itemElapsed) / 500 : 1);
                ctx.drawImage(img, x, y, img.width * ratio, img.height * ratio);
                ctx.globalAlpha = 1;
            } else if (current.type === 'video') {
                const video = current.element;
                const itemElapsed = elapsed - (totalTime - current.duration);
                video.currentTime = itemElapsed / 1000;
                
                const ratio = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
                const x = (canvas.width - video.videoWidth * ratio) / 2;
                const y = (canvas.height - video.videoHeight * ratio) / 2;
                ctx.drawImage(video, x, y, video.videoWidth * ratio, video.videoHeight * ratio);
            }

            renderParticles();
            drawTexts();

            if (isPlaying) requestAnimationFrame(renderFrame);
        }

        function drawTexts() {
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';

            // 퍼스트 문구
            ctx.font = 'bold 80px Noto Sans KR';
            ctx.fillText(texts.first, canvas.width / 2, 200);

            // 세컨드 문구
            ctx.font = '400 50px Noto Sans KR';
            ctx.fillText(texts.second, canvas.width / 2, 280);

            // 서드 문구
            ctx.font = 'bold 60px Noto Sans KR';
            ctx.fillText(texts.third, canvas.width / 2, canvas.height - 150);
            
            ctx.shadowBlur = 0;
        }

        function updateTotalDuration() {
            if (!isPlaying) renderFrame(0);
        }

        playBtn.onclick = () => {
            if (isPlaying) {
                pauseTime = Date.now() - startTime;
                isPlaying = false;
                bgm.pause();
                narration.pause();
            } else {
                startTime = Date.now() - pauseTime;
                isPlaying = true;
                bgm.play().catch(e => console.log("Audio play deferred"));
                narration.play().catch(e => console.log("Audio play deferred"));
                requestAnimationFrame(renderFrame);
            }
        };

        // MP4 내보내기 (Canvas Recording)
        exportBtn.onclick = async () => {
            if (!mediaStack.length) return;
            
            loadingOverlay.classList.remove('hidden');
            document.getElementById('statusMessage').innerText = "인코딩 및 녹화 중...";

            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); // 브라우저 지원에 따라 최선책 사용
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'edited_video.webm'; // 실제 MP4 변환은 서버측 처리가 필요하나 클라이언트 단에서 녹화본 제공
                a.click();
                loadingOverlay.classList.add('hidden');
            };

            // 처음부터 끝까지 재생하며 녹화
            isPlaying = false;
            startTime = Date.now();
            pauseTime = 0;
            isPlaying = true;
            
            const totalDuration = mediaStack.reduce((a, b) => a + b.duration, 0);
            recorder.start();
            
            requestAnimationFrame(renderFrame);

            setTimeout(() => {
                recorder.stop();
                isPlaying = false;
            }, totalDuration);
        };

        // 초기화
        renderFrame(0);
    </script>
</body>
</html>
